<!DOCTYPE html>
<html lang="en">

    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Admin Dashboard</h1>
        <p>Current Date and Time (UTC): 2026-04-22 12:24:45</p>
        <p>User: aligarxzver-wq</p>
    </header>
    <main>
        <section id="statistics">
            <h2>Statistics</h2>
            <p>Total Workers: <span id="total-workers">0</span></p>
