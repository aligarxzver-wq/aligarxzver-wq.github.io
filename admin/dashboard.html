<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Admin Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,Arial,sans-serif;background:#0b1220;color:#fff;display:flex;min-height:100vh}.sidebar{width:260px;background:rgba(255,255,255,.06);backdrop-filter:blur(12px);padding:28px;border-right:1px solid rgba(255,255,255,.08)}.sidebar h2{margin-bottom:28px;font-size:24px}.menu a{display:block;padding:14px 16px;margin-bottom:10px;border-radius:14px;color:#fff;text-decoration:none;background:rgba(255,255,255,.04)}.menu a:hover{background:#2563eb}.content{flex:1;padding:28px}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px}.topbar h1{font-size:34px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-bottom:26px}.card{background:rgba(255,255,255,.06);padding:24px;border-radius:22px;backdrop-filter:blur(12px);box-shadow:0 10px 25px rgba(0,0,0,.2)}.card h3{font-size:16px;opacity:.8;margin-bottom:10px}.card p{font-size:30px;font-weight:700}.table-box{background:rgba(255,255,255,.06);padding:24px;border-radius:22px;backdrop-filter:blur(12px)}table{width:100%;border-collapse:collapse}th,td{padding:14px;text-align:left;border-bottom:1px solid rgba(255,255,255,.08)}th{opacity:.8}tr:hover{background:rgba(255,255,255,.04)}@media(max-width:900px){body{flex-direction:column}.sidebar{width:100%;border-right:none;border-bottom:1px solid rgba(255,255,255,.08)}}
</style>
</head>
<body>
<div class="sidebar">
<h2>🏢 Urgaz Carpet</h2>
<div class="menu">
<a href="#">Dashboard</a>
<a href="#">Workers</a>
<a href="#">Reports</a>
<a href="#">Statistics</a>
<a href="#">Settings</a>
</div>
</div>
<div class="content">
<div class="topbar">
<h1>Admin Dashboard</h1>
<div>22 Apr 2026</div>
</div>
<div class="cards">
<div class="card"><h3>Total Workers</h3><p>124</p></div>
<div class="card"><h3>Today's Reports</h3><p>87</p></div>
<div class="card"><h3>Online Users</h3><p>19</p></div>
<div class="card"><h3>Efficiency</h3><p>96%</p></div>
</div>
<div class="table-box">

<table>
<tr><th>Name</th><th>Status</th><th>Time</th></tr>
<tr><td>Ali Valiyev</td><td>Entered</td><td>08:01</td></tr>

</div>
</div>
</body>
</html>
