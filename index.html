<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urgaz Carpet - Kunlik Hisobot Tizimi</title>
<link rel="stylesheet" href="css/style.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body.login-page{font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);padding:20px}
.login-container{width:100%;max-width:430px}
.login-box{background:rgba(255,255,255,.12);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.18);border-radius:28px;padding:38px;box-shadow:0 20px 45px rgba(0,0,0,.28);color:#fff}
.login-box h1{text-align:center;font-size:34px;margin-bottom:8px}
.login-box h2{text-align:center;font-size:18px;font-weight:400;opacity:.9;margin-bottom:28px}
.form-group{margin-bottom:18px}
.form-group label{display:block;margin-bottom:8px;font-size:14px;font-weight:700}
.form-group input{width:100%;padding:14px 16px;border:none;border-radius:14px;background:rgba(255,255,255,.92);font-size:15px;outline:none;transition:.2s}
.form-group input:focus{transform:translateY(-1px);box-shadow:0 0 0 3px rgba(255,255,255,.25)}
.btn-login{width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(90deg,#22c55e,#16a34a);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:.25s;margin-top:8px}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 22px rgba(34,197,94,.35)}
.error-message{min-height:20px;text-align:center;color:#fecaca;margin-top:14px;font-size:14px}
.info-text{margin-top:22px;padding:14px;border-radius:14px;background:rgba(255,255,255,.1);font-size:14px;line-height:1.5;text-align:center}
@media(max-width:480px){.login-box{padding:26px}.login-box h1{font-size:28px}}
</style>
</head>
<body class="login-page">
<div class="login-container">
<div class="login-box">
<h1>🏢 Urgaz Carpet</h1>
<h2>Kunlik Hisobot Tizimi</h2>
<form id="loginForm">
<div class="form-group">
<label for="username">Foydalanuvchi nomi:</label>
<input type="text" id="username" placeholder="Foydalanuvchi nomini kiriting" required>
</div>
<div class="form-group">
<label for="password">Parol:</label>
<input type="password" id="password" placeholder="Parolni kiriting" required>
</div>
<button type="submit" class="btn-login">Kirish</button>
</form>
<div id="errorMessage" class="error-message"></div>
<p class="info-text">📌 <strong>Test Admin:</strong> Urgaz_Carpet / Urgaz2023</p>
</div>
</div>
<script src="js/auth.js"></script>
</body>
</html>
