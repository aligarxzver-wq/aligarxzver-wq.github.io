<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urgaz Carpet - Kunlik Hisobot Tizimi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <h1>🏢 Urgaz Carpet</h1>
            <h2>Kunlik Hisobot Tizimi</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Foydalanuvchi nomi:</label>
                    <input type="text" id="username" placeholder="Foydalanuvchi nomini kiriting" required>
                </div>

                <div class="form-group">
                    <label for="password">Parol:</label>
                    <input type="password" id="password" placeholder="Parolni kiriting" required>
                </div>

                <button type="submit" class="btn-login">Kirish</button>
            </form>

            <div id="errorMessage" class="error-message"></div>
            
            <p class="info-text">
                📌 <strong>Test Admin:</strong> Urgaz_Carpet / Urgaz2023
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
