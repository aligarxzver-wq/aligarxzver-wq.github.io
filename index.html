<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Login</title><link rel='stylesheet' href='css/style.css'></head><body>
<div class='login-box'><h1>Urgaz Carpet</h1><input id='u' placeholder='Login'><input id='p' type='password' placeholder='Parol'><button onclick='go()'>Kirish</button></div>
<script>
if(!localStorage.users){localStorage.users=JSON.stringify([{login:'Urgaz_Carpet',pass:'Urgaz2023',role:'admin',name:'Admin'}]);}
